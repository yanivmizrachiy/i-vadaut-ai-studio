<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>עמוד 1</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <header class="page-header">
      <h1>עמוד 1</h1>
    </header>

    <section class="question-card" aria-label="שאלה 1">
      <div class="question-number">1</div>

      <div class="question-layout">
        <figure class="visual" aria-label="גלגל צבעים">
          <svg viewBox="0 0 200 200" role="img">
            <circle cx="100" cy="100" r="82" fill="#fff" stroke="#112b4c" stroke-width="1.6"/>
            <path d="M100 100 L100 18 A82 82 0 0 1 171 141 Z" fill="#d9e9fb" stroke="#112b4c" stroke-width="1"/>
            <path d="M100 100 L171 141 A82 82 0 0 1 100 182 Z" fill="#cde8a5" stroke="#112b4c" stroke-width="1"/>
            <path d="M100 100 L100 182 A82 82 0 0 1 29 141 Z" fill="#e2c8fb" stroke="#112b4c" stroke-width="1"/>
            <path d="M100 100 L29 141 A82 82 0 0 1 29 72 Z" fill="#ffffff" stroke="#112b4c" stroke-width="1"/>
            <path d="M100 100 L29 72 A82 82 0 0 1 100 18 Z" fill="#fff0a8" stroke="#112b4c" stroke-width="1"/>
            <line x1="100" y1="100" x2="139" y2="58" stroke="#112b4c" stroke-width="3"/>
            <polygon points="139,58 134,69 128,63" fill="#112b4c"/>
            <circle cx="100" cy="100" r="5" fill="#112b4c"/>
            <text x="139" y="95" text-anchor="middle">סגול</text>
            <text x="61" y="62" text-anchor="middle">כתום</text>
            <text x="136" y="139" text-anchor="middle">אדום</text>
            <text x="60" y="139" text-anchor="middle">כחול</text>
            <text x="43" y="102" text-anchor="middle">ירוק</text>
          </svg>
        </figure>

        <div class="question-text">
          <p>גלגל המשחק שלפניכם הוא משחק החודש.</p>
          <p>מתוך 600 סיבובים,</p>
          <p>כמה פעמים בערך יש לצפות לכך שהמחוג יעצר בצבע האדום?</p>
        </div>
      </div>

      <section class="choices" aria-label="אפשרויות בחירה">
        <div class="choice"><span class="letter">א</span><span class="value">30</span></div>
        <div class="choice"><span class="letter">ב</span><span class="value">40</span></div>
        <div class="choice"><span class="letter">ג</span><span class="value">50</span></div>
        <div class="choice"><span class="letter">ד</span><span class="value">60</span></div>
      </section>
    </section>

    <section class="solution-lines" aria-label="אזור פתרון ריק">
      <div class="sline"></div>
      <div class="sline"></div>
      <div class="sline"></div>
      <div class="sline"></div>
    </section>

    <footer class="elegant-footer">
      <div class="footer-line"></div>
      <div class="footer-text">תחום וודאות</div>
    </footer>
  </main>
</body>
</html>
